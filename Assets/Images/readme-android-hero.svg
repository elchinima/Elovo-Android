<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Elovo Android app hero</title>
  <desc id="desc">Animated Android phone preview for the Elovo mobile chat app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="0.52" stop-color="#172554"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <linearGradient id="phone" x1="455" y1="25" x2="745" y2="395" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="screen" x1="489" y1="66" x2="711" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101827"/>
      <stop offset="1" stop-color="#0B1120"/>
    </linearGradient>
    <linearGradient id="bubbleA" x1="523" y1="125" x2="678" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="bubbleB" x1="525" y1="214" x2="671" y2="269" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="438" y="-20" width="424" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>

  <g opacity="0.4">
    <path d="M112 99H286" stroke="#38BDF8" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.25;0.8;0.25" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M913 320H1088" stroke="#2DD4BF" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.8;0.25;0.8" dur="4.8s" repeatCount="indefinite"/>
    </path>
    <circle cx="238" cy="297" r="55" stroke="#6366F1" stroke-width="2"/>
    <circle cx="982" cy="111" r="72" stroke="#22C55E" stroke-width="2"/>
  </g>

  <text x="112" y="145" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="50" font-weight="800">Elovo Android</text>
  <text x="113" y="192" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22">
    <tspan x="113" dy="0">Native shell for secure chat,</tspan>
    <tspan x="113" dy="30">calls, media, and push.</tspan>
  </text>
  <text x="112" y="278" fill="#67E8F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">
    <tspan x="112" dy="0">WebView + Firebase Cloud Messaging</tspan>
    <tspan x="112" dy="28">Android audio controls</tspan>
  </text>

  <g filter="url(#shadow)" transform="translate(50 0)">
    <rect x="455" y="24" width="290" height="372" rx="44" fill="url(#phone)" stroke="#334155" stroke-width="3"/>
    <rect x="488" y="64" width="224" height="292" rx="28" fill="url(#screen)" stroke="#1E293B"/>
    <rect x="561" y="43" width="78" height="8" rx="4" fill="#334155"/>
    <circle cx="600" cy="375" r="11" fill="#1E293B"/>

    <rect x="516" y="93" width="168" height="26" rx="13" fill="#0F766E"/>
    <text x="541" y="112" fill="#ECFEFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Elovo is online</text>

    <g>
      <rect x="516" y="142" width="133" height="46" rx="18" fill="url(#bubbleA)"/>
      <rect x="551" y="207" width="133" height="46" rx="18" fill="url(#bubbleB)"/>
      <rect x="516" y="272" width="101" height="46" rx="18" fill="#334155"/>
      <text x="535" y="171" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Hey there!</text>
      <text x="573" y="236" fill="#042F2E" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800">Call?</text>
      <text x="539" y="301" fill="#E2E8F0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Sure</text>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -7;0 0" dur="3.2s" repeatCount="indefinite"/>
    </g>

    <g>
      <circle cx="678" cy="292" r="22" fill="#22C55E"/>
      <path d="M668 292c11 15 20 15 22 0" stroke="#052E16" stroke-width="5" stroke-linecap="round"/>
      <path d="M668 285c8-10 15-10 22 0" stroke="#052E16" stroke-width="5" stroke-linecap="round"/>
      <animate attributeName="opacity" values="1;0.72;1" dur="1.8s" repeatCount="indefinite"/>
    </g>
  </g>

  <g transform="translate(862 146)">
    <rect width="242" height="128" rx="18" fill="#0F172A" stroke="#334155"/>
    <text x="24" y="42" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Mobile features</text>
    <text x="24" y="75" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Push calls</text>
    <text x="24" y="103" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Camera and media upload</text>
    <circle cx="204" cy="71" r="8" fill="#22C55E">
      <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
